<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ゴリラ副社長のバナナ大作戦 3D（試作）</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#9fd6ff;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
  #app{position:fixed;inset:0;}
  canvas{display:block;}
  #hud{position:absolute;top:10px;left:14px;z-index:10;font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 4px #0008;}
  #note{position:absolute;top:10px;right:14px;z-index:10;font-size:12px;color:#fff;background:#0006;padding:4px 8px;border-radius:8px;}
  #pad{position:absolute;left:0;right:0;bottom:0;height:150px;z-index:20;pointer-events:none;}
  .ctrl{position:absolute;bottom:22px;width:80px;height:80px;border-radius:50%;background:#ffffff2e;border:2px solid #ffffff66;
    color:#fff;font-size:32px;font-weight:900;display:flex;align-items:center;justify-content:center;pointer-events:auto;}
  .ctrl:active{background:#ffffff55;}
  #bL{left:22px;} #bR{left:116px;} #bJ{right:26px;width:100px;height:100px;font-size:18px;background:#ffd24a44;border-color:#ffd24a;}
  #loading{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;
    color:#fff;background:linear-gradient(160deg,#1d4e89,#0b1d33);text-align:center;padding:24px;}
  #loading h1{font-size:26px;} #loading .s{font-size:13px;color:#cfe0f5;line-height:1.7;}
  .btn{margin-top:8px;cursor:pointer;border:none;border-radius:999px;padding:13px 32px;font-size:18px;font-weight:800;color:#3a2a00;
    background:linear-gradient(#ffe27a,#ffc62e);box-shadow:0 5px 0 #c8920a;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">🍌 0</div>
  <div id="note">3D版（試作）</div>
  <div id="pad">
    <div id="bL" class="ctrl">‹</div>
    <div id="bR" class="ctrl">›</div>
    <div id="bJ" class="ctrl">JUMP</div>
  </div>
  <div id="loading">
    <h1>🦍 3D版 ゴリラ副社長</h1>
    <div class="s">Three.js による3D試作です。<br>左右で移動・JUMPでジャンプ（2段ジャンプOK）。<br>バナナを集めよう！<br><br><b id="modelInfo">キャラ: 仮モデル（takahashi.glb を置くと自動で差し替え）</b></div>
    <button class="btn" id="startBtn">スタート</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

const app=document.getElementById('app');
const hud=document.getElementById('hud');

// --- レンダラ / シーン / カメラ ---
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color('#8fd0ff');
scene.fog=new THREE.Fog('#bfe6ff', 30, 90);

const camera=new THREE.PerspectiveCamera(55, 1, 0.1, 300);

function resize(){
  const w=innerWidth, h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();

// --- ライト ---
scene.add(new THREE.HemisphereLight('#ffffff', '#8fae6a', 0.9));
const sun=new THREE.DirectionalLight('#fff6d8', 1.1);
sun.position.set(8,18,10); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-30; sun.shadow.camera.right=30; sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
scene.add(sun);

// --- 地面（縞テクスチャでスピード感）---
const gcan=document.createElement('canvas'); gcan.width=gcan.height=128;
const gx=gcan.getContext('2d');
gx.fillStyle='#7cc24a'; gx.fillRect(0,0,128,128);
gx.fillStyle='#6bb03e'; for(let i=0;i<128;i+=32) gx.fillRect(i,0,16,128);
const gtex=new THREE.CanvasTexture(gcan);
gtex.wrapS=gtex.wrapT=THREE.RepeatWrapping; gtex.repeat.set(60,8);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,40), new THREE.MeshStandardMaterial({map:gtex}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// 背景の丘
function hill(x,z,s,c){
  const m=new THREE.Mesh(new THREE.SphereGeometry(s,16,12), new THREE.MeshStandardMaterial({color:c}));
  m.position.set(x,-s*0.55,z); m.scale.y=0.6; scene.add(m); return m;
}
for(let i=0;i<10;i++) hill((i-3)*22, -22-Math.random()*8, 8+Math.random()*6, i%2?'#9fd57e':'#bfe39a');

// ヤシの木（奥）
function palm(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.35,5,8), new THREE.MeshStandardMaterial({color:'#a9743f'}));
  trunk.position.y=2.5; g.add(trunk);
  for(let k=0;k<5;k++){
    const leaf=new THREE.Mesh(new THREE.ConeGeometry(0.5,3,6), new THREE.MeshStandardMaterial({color:'#3f9e4d'}));
    leaf.position.y=5; leaf.rotation.z=Math.PI/2.3; leaf.rotation.y=k*Math.PI*2/5; g.add(leaf);
  }
  g.position.set(x,0,z); scene.add(g); return g;
}
const palms=[]; for(let i=0;i<8;i++) palms.push(palm(i*14, -10-Math.random()*6));

// --- プレイヤー（仮モデル / glbで差し替え）---
const charGroup=new THREE.Group(); scene.add(charGroup);
let placeholder=new THREE.Group();
(()=>{
  const fur=new THREE.MeshStandardMaterial({color:'#cdbfa6'});   // 作業着っぽい色
  const skin=new THREE.MeshStandardMaterial({color:'#f0c9a8'});
  const headR=1.05;
  // 体（小さめ・大きい頭とのバランス＝サルゲッチュ風）
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.5,0.7,6,12), fur); body.position.y=1.0; body.castShadow=true; placeholder.add(body);
  const tie=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.16,0.16), new THREE.MeshStandardMaterial({color:'#d23b3b'})); tie.position.set(0,1.35,0.45); placeholder.add(tie);
  // 大きい頭
  const head=new THREE.Mesh(new THREE.SphereGeometry(headR,22,18), skin); head.position.y=2.4; head.castShadow=true; placeholder.add(head);
  // 顔（face.png を前面に貼る。無ければ仮の目鼻）
  const faceMat=new THREE.MeshStandardMaterial({color:'#f0c9a8', transparent:true});
  const faceMesh=new THREE.Mesh(new THREE.CircleGeometry(headR*0.94, 40), faceMat);
  faceMesh.position.set(0,2.4, headR*0.9); placeholder.add(faceMesh);
  const tmpEyes=new THREE.Group();
  for(const sx of [-1,1]){
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,10), new THREE.MeshStandardMaterial({color:'#222'}));
    eye.position.set(sx*0.28,2.5,headR*0.93+0.02); tmpEyes.add(eye);
  }
  const mouth=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.06,0.02), new THREE.MeshStandardMaterial({color:'#7a3b3b'}));
  mouth.position.set(0,2.12,headR*0.93+0.02); tmpEyes.add(mouth);
  placeholder.add(tmpEyes);
  // 顔テクスチャ読み込み（face.png / face.jpg）
  const texLoader=new THREE.TextureLoader();
  const tryLoad=(name,next)=> texLoader.load(name, t=>{
    t.encoding=THREE.sRGBEncoding;
    faceMat.map=t; faceMat.color.set('#ffffff'); faceMat.needsUpdate=true;
    tmpEyes.visible=false;
    document.getElementById('modelInfo').textContent='顔: '+name+' を読み込みました ✓';
  }, undefined, ()=>{ if(next) next(); });
  tryLoad('face.png', ()=>tryLoad('face.jpg', null));
  // 手足
  for(const sx of [-1,1]){
    const arm=new THREE.Mesh(new THREE.CapsuleGeometry(0.16,0.5,4,8), fur); arm.position.set(sx*0.62,1.0,0); arm.castShadow=true; placeholder.add(arm);
    const leg=new THREE.Mesh(new THREE.CapsuleGeometry(0.18,0.45,4,8), fur); leg.position.set(sx*0.25,0.3,0); leg.castShadow=true; placeholder.add(leg);
    placeholder['leg'+(sx<0?'L':'R')]=leg; placeholder['arm'+(sx<0?'L':'R')]=arm;
  }
  charGroup.add(placeholder);
})();

let model=null, mixer=null, action=null;
const loader=new THREE.GLTFLoader();
loader.load('takahashi.glb', (g)=>{
  model=g.scene; model.traverse(o=>{ if(o.isMesh){o.castShadow=true;} });
  const box=new THREE.Box3().setFromObject(model); const size=new THREE.Vector3(); box.getSize(size);
  const s=2.4/Math.max(size.x,size.y,size.z); model.scale.setScalar(s);
  const box2=new THREE.Box3().setFromObject(model); model.position.y=-box2.min.y;
  placeholder.visible=false; charGroup.add(model);
  if(g.animations && g.animations.length){ mixer=new THREE.AnimationMixer(model); action=mixer.clipAction(g.animations[0]); action.play(); }
  document.getElementById('modelInfo').textContent='キャラ: takahashi.glb を読み込みました ✓';
}, undefined, ()=>{ /* まだ無い場合は仮モデルのまま */ });

// --- バナナ ---
function makeBanana(){
  const curve=new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.5,0.18,0), new THREE.Vector3(-0.2,-0.28,0),
    new THREE.Vector3(0.2,-0.28,0), new THREE.Vector3(0.5,0.18,0)
  ]);
  const m=new THREE.Mesh(new THREE.TubeGeometry(curve,20,0.16,8,false),
    new THREE.MeshStandardMaterial({color:'#ffd23a', emissive:'#5a4400', emissiveIntensity:0.3}));
  m.castShadow=true; return m;
}
const bananas=[];
let genX=6;
function spawnAhead(){
  while(genX < player.x + 70){
    const n=2+(Math.random()*3|0);
    for(let i=0;i<n;i++){
      const b=makeBanana();
      b.position.set(genX+i*1.6, 1+Math.random()*2.2, (Math.random()-0.5)*3);
      scene.add(b); bananas.push(b);
    }
    genX += 8+Math.random()*6;
  }
  // ヤシを前方へ循環
  for(const p of palms){ if(p.position.x < player.x-20) p.position.x += 14*8; }
}

// --- プレイヤー状態・入力 ---
const player={x:0,y:0,vy:0,vx:0,onGround:true,jumps:0,face:1};
const GRAV=22, JUMP=9.5, SPEED=7;
let score=0, started=false, runPhase=0;

const keys={}, btn={l:false,r:false,j:false};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
function bind(id,k){ const el=document.getElementById(id);
  const on=e=>{btn[k]=true;e.preventDefault();}, off=e=>{btn[k]=false;e.preventDefault();};
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bind('bL','l'); bind('bR','r'); bind('bJ','j');
let jumpHeld=false;
const L=()=>keys['arrowleft']||keys['a']||btn.l;
const R=()=>keys['arrowright']||keys['d']||btn.r;
const J=()=>keys['arrowup']||keys['w']||keys[' ']||btn.j;

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('loading').style.display='none'; started=true;
});

// --- ループ ---
const clock=new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt=Math.min(clock.getDelta(),0.05);
  if(started){
    // 移動
    player.vx = R()?SPEED : L()?-SPEED : 0;
    if(player.vx>0) player.face=1; else if(player.vx<0) player.face=-1;
    const jp=J();
    if(jp&&!jumpHeld){
      if(player.onGround){player.vy=JUMP; player.onGround=false; player.jumps=1;}
      else if(player.jumps<2){player.vy=JUMP*0.92; player.jumps=2;}
    }
    jumpHeld=jp;
    player.vy-=GRAV*dt;
    player.x+=player.vx*dt; player.y+=player.vy*dt;
    if(player.y<=0){player.y=0; player.vy=0; player.onGround=true; player.jumps=0;}

    charGroup.position.set(player.x,player.y,0);
    charGroup.rotation.y = player.face>0 ? Math.PI/2 : -Math.PI/2;

    // 走りアニメ（仮モデル時）
    const moving=Math.abs(player.vx)>0.1 && player.onGround;
    if(moving) runPhase+=dt*12;
    if(placeholder.visible){
      const sw=moving?Math.sin(runPhase)*0.6:0;
      if(placeholder.legL) placeholder.legL.rotation.x=sw;
      if(placeholder.legR) placeholder.legR.rotation.x=-sw;
      if(placeholder.armL) placeholder.armL.rotation.x=-sw;
      if(placeholder.armR) placeholder.armR.rotation.x=sw;
      placeholder.position.y = player.onGround? Math.abs(Math.sin(runPhase))*0.08 : 0.1;
    }
    if(mixer){ mixer.update(dt); if(action) action.paused=!moving && player.onGround; }

    // カメラ追従（やや斜めの2.5D）
    camera.position.set(player.x-3, 5, 13);
    camera.lookAt(player.x+3, 1.6, 0);

    // 地面とテクスチャを追従
    ground.position.x=player.x; gtex.offset.x=player.x*0.05; sun.position.x=player.x+8; sun.target.position.set(player.x,0,0); sun.target.updateMatrixWorld();

    // バナナ生成・回収
    spawnAhead();
    for(let i=bananas.length-1;i>=0;i--){
      const b=bananas[i]; b.rotation.y+=dt*3; b.position.y+=Math.sin(performance.now()*0.004+b.position.x)*0.003;
      const dx=b.position.x-player.x, dy=b.position.y-(player.y+1.4), dz=b.position.z;
      if(dx*dx+dy*dy+dz*dz < 1.6){
        scene.remove(b); bananas.splice(i,1); score++; hud.textContent='🍌 '+score;
      } else if(b.position.x < player.x-12){ scene.remove(b); bananas.splice(i,1); }
    }
  }
  renderer.render(scene,camera);
}
tick();
</script>
</body>
</html>
